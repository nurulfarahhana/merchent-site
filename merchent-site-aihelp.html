        function App() {
            const [lang, setLang] = useState(() => localStorage.getItem('lgb_lang') || 'en');
            const [products, setProducts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [cart, setCart] = useState(() => JSON.parse(localStorage.getItem('lgb_cart')) || []);
            const [wishlist, setWishlist] = useState(() => JSON.parse(localStorage.getItem('lgb_wishlist')) || []);
            const [history, setHistory] = useState(() => JSON.parse(localStorage.getItem('lgb_history')) || []);
            
            const [category, setCategory] = useState('All');
            const [search, setSearch] = useState('');
            const [activeSidebar, setActiveSidebar] = useState('none');
            const [promoCode, setPromoCode] = useState('');
            const [discountRate, setDiscountRate] = useState(0);
            const [promoMessage, setPromoMessage] = useState({ text: '', isSuccess: false });
            const [toasts, setToasts] = useState([]);
            const [quickViewProduct, setQuickViewProduct] = useState(null);
            const [checkoutProcessing, setCheckoutProcessing] = useState(false);
            const [newsletterEmail, setNewsletterEmail] = useState('');
            const [newsletterSubscribed, setNewsletterSubscribed] = useState(false);

            useEffect(() => {
                localStorage.setItem('lgb_lang', lang);
            }, [lang]);

            useEffect(() => {
                localStorage.setItem('lgb_cart', JSON.stringify(cart));
            }, [cart]);

            useEffect(() => {
                localStorage.setItem('lgb_wishlist', JSON.stringify(wishlist));
            }, [wishlist]);

            useEffect(() => {
                localStorage.setItem('lgb_history', JSON.stringify(history));
            }, [history]);

            useEffect(() => {
                // Simulate async API call
                const timer = setTimeout(() => {
                    setProducts(PRODUCTS_MOCK);
                    setLoading(false);
                }, 800);
                return () => clearTimeout(timer);
            }, []);

            const showToast = (message, type = 'success') => {
                const id = Date.now().toString();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 3000);
            };

            const handleAddToCart = (product, e) => {
                if (e) e.stopPropagation();
                setCart(prevCart => {
                    const existing = prevCart.find(item => item.product.id === product.id);
                    if (existing) {
                        return prevCart.map(item => 
                            item.product.id === product.id ? { ...item, quantity: item.quantity + 1 } : item
                        );
                    }
                    return [...prevCart, { product, quantity: 1 }];
                });
                handleAddToHistory(product);
                showToast(`"${product.name}" ${I18N[lang].added_to_cart}`, 'success');
            };

            const handleUpdateCartQty = (productId, delta) => {
                setCart(prevCart => {
                    return prevCart.map(item => {
                        if (item.product.id === productId) {
                            const newQty = item.quantity + delta;
                            return newQty > 0 ? { ...item, quantity: newQty } : null;
                        }
                        return item;
                    }).filter(Boolean);
                });
            };

            const handleRemoveFromCart = (productId) => {
                setCart(prev => prev.filter(item => item.product.id !== productId));
            };

            const handleToggleWishlist = (product, e) => {
                if (e) e.stopPropagation();
                const isWishlisted = wishlist.some(item => item.id === product.id);
                if (isWishlisted) {
                    setWishlist(prev => prev.filter(item => item.id !== product.id));
                    showToast(`"${product.name}" ${I18N[lang].removed_from_wishlist}`, 'info');
                } else {
                    setWishlist(prev => [...prev, product]);
                    showToast(`"${product.name}" ${I18N[lang].added_to_wishlist}`, 'success');
                }
            };

            const handleAddToHistory = (product) => {
                setHistory(prev => {
                    const filtered = prev.filter(item => item.id !== product.id);
                    return [product, ...filtered].slice(0, 4);
                });
            };

            const handleApplyPromo = () => {
                const formatted = promoCode.trim().toUpperCase();
                if (formatted === 'PORTFOLIO20') {
                    setDiscountRate(0.20);
                    setPromoMessage({ text: I18N[lang].promo_success, isSuccess: true });
                } else {
                    setDiscountRate(0);
                    setPromoMessage({ text: I18N[lang].promo_fail, isSuccess: false });
                }
            };

            const handleNewsletterSubmit = (e) => {
                e.preventDefault();
                setNewsletterSubscribed(true);
                showToast(I18N[lang].newsletter_success, 'success');
            };

            const handleCheckout = () => {
                setCheckoutProcessing(true);
                setTimeout(() => {
                    setCheckoutProcessing(false);
                    setCart([]);
                    setActiveSidebar('none');
                    showToast(I18N[lang].checkout_success, 'success');
                }, 2000);
            };

            const filteredProducts = useMemo(() => {
                return products.filter(p => {
                    const matchCategory = category === 'All' || p.category === category;
                    const matchSearch = p.name.toLowerCase().includes(search.toLowerCase()) || 
                                        p.desc[lang].toLowerCase().includes(search.toLowerCase());
                    return matchCategory && matchSearch;
                });
            }, [products, category, search, lang]);

            const cartCalculations = useMemo(() => {
                const subtotal = cart.reduce((acc, item) => acc + (item.product.price * item.quantity), 0);
                const discount = subtotal * discountRate;
                const total = Math.max(0, subtotal - discount);
                return { subtotal, discount, total };
            }, [cart, discountRate]);

            return (
                <div className="min-h-screen flex flex-col justify-between">
                    <div>
                        {/* Shipping Banner */}

                                            <span className="text-[9px] md:text-[10px] tracking-[0.25em] text-neutral-400 font-semibold uppercase mt-0.5">

                                    </div>

                                    {/* Search Bar */}

                                            </svg>
                                        </div>
                                        <input
                                            type="text"
                                            value={search}
                                            onChange={(e) => setSearch(e.target.value)}

                                            className="w-full pl-9 pr-4 py-1.5 text-xs bg-neutral-100 border border-neutral-200 rounded-full focus:outline-none focus:ring-1 focus:ring-zinc-950 focus:bg-white transition-all text-zinc-800"

                                    </div>

                                    {/* Action Triggers */}
                                    <div className="flex items-center space-x-4 md:space-x-6">

                                            <span className="text-zinc-300 text-xs">|</span>
                                            <button onClick={() => setLang('my')} className={`px-1.5 py-0.5 text-xs font-semibold rounded ${lang === 'my' ? 'bg-[#1a1a1a] text-white' : 'text-zinc-500 hover:text-black'}`}>MY</button>
                                        </div>

                                        {/* Wishlist Icon */}
                                        <button onClick={() => setActiveSidebar('wishlist')} className="relative p-1 text-zinc-700 hover:text-black focus:outline-none">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                                            </svg>
                                            {wishlist.length > 0 && (
                                                <span className="absolute -top-1 -right-1 flex h-4 w-4 items-center justify-center rounded-full bg-[#c5a059] text-[9px] font-bold text-white">
                                                    {wishlist.length}
                                                </span>
                                            )}
                                        </button>

                                        {/* Cart Icon */}
                                        <button onClick={() => setActiveSidebar('cart')} className="relative p-1 text-zinc-700 hover:text-black focus:outline-none">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">
                                                <path strokeLinecap="round" strokeLinejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                                            </svg>
                                            {cart.length > 0 && (
                                                <span className="absolute -top-1 -right-1 flex h-4 w-4 items-center justify-center rounded-full bg-zinc-950 text-[9px] font-bold text-white">
                                                    {cart.reduce((a, b) => a + b.quantity, 0)}

                                            )}

                                    <h1 className="font-serif text-4xl sm:text-5xl lg:text-6xl font-extrabold text-zinc-900 leading-tight mb-6">{I18N[lang].hero_title}</h1>
                                    <p className="text-zinc-600 font-light text-sm sm:text-base leading-relaxed mb-8">{I18N[lang].hero_desc}</p>
                                    <a href="#shop" className="inline-block px-8 py-3.5 bg-zinc-950 text-white text-xs font-semibold uppercase tracking-widest hover:bg-[#c5a059] transition-all">{I18N[lang].hero_cta}</a>
                                </div>
                            </div>
                        </header>

                        {/* Catalog & Filter Grid */}
                        <main id="shop" className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">

                                    <p className="text-zinc-500 text-xs mt-1.5 font-light">

                                    </p>
                                </div>
                                <div className="flex items-center space-x-1 overflow-x-auto pb-2 scrollbar-none">
                                    {['All', 'Accessories', 'Home', 'Apparel'].map((cat) => (
                                        <button
                                            key={cat}
                                            onClick={() => setCategory(cat)}
                                            className={`px-5 py-2 text-xs font-bold tracking-wider uppercase border transition-all ${category === cat ? 'bg-zinc-950 border-zinc-950 text-white' : 'border-transparent text-zinc-500 hover:text-zinc-900 hover:bg-neutral-100'}`}
                                        >
                                            {cat === 'All' ? I18N[lang].cat_all : cat}
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Products Grid */}
                            {loading ? (
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {[1, 2, 3].map(id => (
                                        <div key={id} className="animate-pulse space-y-4">
                                            <div className="aspect-[3/4] bg-neutral-200" />
                                            <div className="h-4 bg-neutral-200 w-2/3" />
                                            <div className="h-3 bg-neutral-200 w-1/3" />
                                        </div>
                                    ))}
                                </div>
                            ) : filteredProducts.length === 0 ? (
                                <p className="text-center text-zinc-500 py-10">{I18N[lang].no_products}</p>
                            ) : (
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-10">
                                    {filteredProducts.map(product => {
                                        const isWishlisted = wishlist.some(w => w.id === product.id);
                                        return (
                                            <div key={product.id} className="group bg-white border border-neutral-100 p-3 flex flex-col justify-between hover:shadow-xl transition-all">
                                                <div className="relative aspect-[3/4] bg-neutral-100 overflow-hidden cursor-pointer" onClick={() => setQuickViewProduct(product)}>
                                                    <img src={product.img} alt={product.name} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" />
                                                    
                                                    {product.isNew && (
                                                        <span className="absolute top-3 left-3 bg-[#c5a059] text-white text-[9px] font-bold tracking-widest px-2 py-1">NEW</span>
                                                    )}

                                                    <button onClick={(e) => handleToggleWishlist(product, e)} className="absolute top-3 right-3 bg-white/90 p-2 rounded-full shadow-md">
                                                        <svg className={`w-4 h-4 ${isWishlisted ? 'fill-red-500 text-red-500' : 'text-zinc-700'}`} fill={isWishlisted ? 'currentColor' : 'none'} stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                                                            <path strokeLinecap="round" strokeLinejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                                                        </svg>
                                                    </button>

                                                    <button onClick={(e) => handleAddToCart(product, e)} className="absolute bottom-4 right-4 bg-white hover:bg-zinc-950 hover:text-white text-zinc-950 p-3 rounded-full shadow-lg transition-colors md:opacity-0 group-hover:opacity-100">
                                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24">
                                                            <path strokeLinecap="round" strokeLinejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                                                        </svg>
                                                    </button>
                                                </div>

                                                <div className="pt-4 flex-grow">
                                                    <div className="flex justify-between text-xs font-bold text-zinc-800">
                                                        <span className="text-[10px] uppercase text-[#c5a059] tracking-wider">{product.category}</span>
                                                        <span>${product.price}</span>
                                                    </div>
                                                    <h3 className="font-serif text-base font-semibold mt-1 cursor-pointer" onClick={() => setQuickViewProduct(product)}>{product.name}</h3>
                                                    <p className="text-zinc-500 text-[11px] mt-1 line-clamp-2 leading-relaxed">{product.desc[lang]}</p>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </main>
                    </div>

                    {/* Footer */}
                    <footer className="bg-white border-t border-neutral-200 py-16 mt-20">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 grid grid-cols-1 md:grid-cols-3 gap-12">
                            <div>
                                <h4 className="font-serif text-lg font-bold uppercase mb-4">LAGHOBUYING</h4>
                                <p className="text-zinc-500 font-light text-xs leading-relaxed max-w-sm">{I18N[lang].footer_desc}</p>
                            </div>
                            <div>
                                <h4 className="text-xs font-bold uppercase tracking-[0.2em] mb-4 text-zinc-400">Collections</h4>
                                <ul className="space-y-2 text-xs font-bold text-zinc-600">
                                    <li><button onClick={() => setCategory('Accessories')} className="hover:text-[#c5a059]">Accessories</button></li>
                                    <li><button onClick={() => setCategory('Home')} className="hover:text-[#c5a059]">Home Decor</button></li>
                                    <li><button onClick={() => setCategory('Apparel')} className="hover:text-[#c5a059]">Apparel</button></li>
                                </ul>
                            </div>
                            <div>
                                <h4 className="font-serif text-sm font-bold mb-2">{I18N[lang].newsletter_title}</h4>
                                <p className="text-zinc-500 text-xs mb-4">{I18N[lang].newsletter_desc}</p>
                                {newsletterSubscribed ? (
                                    <p className="text-xs font-bold text-emerald-600">{I18N[lang].newsletter_success}</p>
                                ) : (
                                    <form onSubmit={handleNewsletterSubmit} className="flex">
                                        <input type="email" required value={newsletterEmail} onChange={(e) => setNewsletterEmail(e.target.value)} placeholder={I18N[lang].newsletter_placeholder} className="px-3 py-2 bg-neutral-100 text-xs rounded-l focus:outline-none w-full" />
                                        <button type="submit" className="px-4 bg-zinc-950 text-white hover:bg-[#c5a059] text-xs font-semibold rounded-r">{I18N[lang].newsletter_btn}</button>
                                    </form>
                                )}
                            </div>
                        </div>
                    </footer>

                    {/* Side Sidebar Overlay Panels */}
                    {activeSidebar !== 'none' && (
                        <div className="fixed inset-0 z-50 flex justify-end">
                            <div onClick={() => setActiveSidebar('none')} className="absolute inset-0 bg-zinc-950/40 backdrop-blur-xs" />
                            <div className="relative bg-white w-full max-w-md h-full flex flex-col z-10 shadow-2xl p-6">
                                <div className="flex justify-between items-center pb-4 border-b border-neutral-200">
                                    <h3 className="font-serif text-lg font-bold uppercase">{activeSidebar === 'cart' ? I18N[lang].cart_title : I18N[lang].wishlist_title}</h3>
                                    <button onClick={() => setActiveSidebar('none')} className="text-zinc-400 hover:text-black text-2xl">&times;</button>
                                </div>

                                <div className="flex-grow overflow-y-auto py-4 space-y-4">
                                    {activeSidebar === 'cart' ? (
                                        cart.length === 0 ? <p className="text-center text-zinc-400 text-sm mt-10">{I18N[lang].cart_empty}</p> : (
                                            cart.map(({ product, quantity }) => (
                                                <div key={product.id} className="flex gap-4 pb-4 border-b">
                                                    <img src={product.img} alt={product.name} className="w-16 h-20 object-cover" />
                                                    <div className="flex-grow">
                                                        <div className="flex justify-between">
                                                            <h4 className="text-xs font-bold">{product.name}</h4>
                                                            <button onClick={() => handleRemoveFromCart(product.id)} className="text-zinc-400 hover:text-red-500">&times;</button>
                                                        </div>
                                                        <p className="text-xs font-semibold text-zinc-800 mt-2">${product.price}</p>
                                                        <div className="flex items-center space-x-2 mt-2">
                                                            <button onClick={() => handleUpdateCartQty(product.id, -1)} className="w-6 h-6 border rounded-full flex items-center justify-center text-xs">-</button>
                                                            <span className="text-xs font-bold">{quantity}</span>
                                                            <button onClick={() => handleUpdateCartQty(product.id, 1)} className="w-6 h-6 border rounded-full flex items-center justify-center text-xs">+</button>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))
                                        )
                                    ) : (
                                        wishlist.length === 0 ? <p className="text-center text-zinc-400 text-sm mt-10">{I18N[lang].wishlist_empty}</p> : (
                                            wishlist.map(product => (
                                                <div key={product.id} className="flex gap-4 pb-4 border-b items-center justify-between">
                                                    <div className="flex gap-3 items-center">
                                                        <img src={product.img} alt={product.name} className="w-12 h-16 object-cover" />
                                                        <div>
                                                            <h4 className="text-xs font-bold">{product.name}</h4>
                                                            <p className="text-xs font-semibold text-zinc-800">${product.price}</p>
                                                        </div>
                                                    </div>
                                                    <button onClick={() => handleAddToCart(product)} className="px-3 py-1 bg-zinc-950 text-white text-[10px] uppercase font-bold">Add</button>
                                                </div>
                                            ))
                                        )
                                    )}
                                </div>

                                {activeSidebar === 'cart' && cart.length > 0 && (
                                    <div className="border-t pt-4 space-y-4">
                                        <div>
                                            <label className="text-[10px] font-bold text-zinc-500 uppercase block mb-1">{I18N[lang].promo_label}</label>
                                            <div className="flex">
                                                <input type="text" value={promoCode} onChange={(e) => setPromoCode(e.target.value)} placeholder={I18N[lang].promo_placeholder} className="flex-grow px-3 py-2 border text-xs" />
                                                <button onClick={handleApplyPromo} className="px-4 bg-zinc-950 text-white text-xs uppercase font-bold">{I18N[lang].promo_btn}</button>
                                            </div>
                                            {promoMessage.text && <p className={`text-[10px] mt-1 ${promoMessage.isSuccess ? 'text-emerald-600' : 'text-red-500'}`}>{promoMessage.text}</p>}
                                        </div>
                                        <div className="space-y-1">
                                            <div className="flex justify-between text-xs text-zinc-500">
                                                <span>Subtotal</span>
                                                <span>${cartCalculations.subtotal.toFixed(2)}</span>
                                            </div>
                                            {discountRate > 0 && (
                                                <div className="flex justify-between text-xs text-emerald-600 font-bold">
                                                    <span>Discount (20%)</span>
                                                    <span>-${cartCalculations.discount.toFixed(2)}</span>
                                                </div>
                                            )}
                                            <div className="flex justify-between text-base font-bold text-zinc-950 pt-2 border-t">
                                                <span>Total</span>
                                                <span>${cartCalculations.total.toFixed(2)}</span>
                                            </div>
                                        </div>
                                        <button onClick={handleCheckout} disabled={checkoutProcessing} className="w-full py-3.5 bg-zinc-950 text-white text-xs uppercase font-bold tracking-widest">
                                            {checkoutProcessing ? I18N[lang].checkout_process : I18N[lang].checkout_btn}
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Quick View Dialog Modal */}
                    {quickViewProduct && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div onClick={() => setQuickViewProduct(null)} className="absolute inset-0 bg-zinc-950/40 backdrop-blur-xs" />
                            <div className="relative bg-white max-w-2xl w-full flex flex-col md:flex-row shadow-2xl z-10 p-6 md:p-8">
                                <button onClick={() => setQuickViewProduct(null)} className="absolute top-4 right-4 text-2xl font-bold">&times;</button>
                                <div className="w-full md:w-1/2 aspect-square md:h-[350px] bg-neutral-100">
                                    <img src={quickViewProduct.img} alt={quickViewProduct.name} className="w-full h-full object-cover" />
                                </div>
                                <div className="w-full md:w-1/2 md:pl-6 flex flex-col justify-between mt-4 md:mt-0">
                                    <div>
                                        <span className="text-[10px] text-[#c5a059] uppercase font-bold block mb-1">{quickViewProduct.category}</span>
                                        <h3 className="font-serif text-xl font-bold">{quickViewProduct.name}</h3>
                                        <p className="text-lg font-bold text-zinc-800 mt-2">${quickViewProduct.price}</p>
                                        <p className="text-xs text-emerald-600 font-semibold mt-1">{I18N[lang].in_stock}</p>
                                        <p className="text-xs text-zinc-600 mt-4 leading-relaxed font-light">{quickViewProduct.desc[lang]}</p>
                                    </div>
                                    <button onClick={() => { handleAddToCart(quickViewProduct); setQuickViewProduct(null); }} className="w-full py-3 bg-zinc-950 text-white text-xs uppercase font-bold tracking-widest mt-6">
                                        {I18N[lang].add_to_cart}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Recently Viewed Bar */}
                    {history.length > 0 && (
                        <div className="fixed bottom-4 right-4 bg-white border border-neutral-200 p-4 shadow-xl z-30 w-72 hidden md:block">
                            <div className="flex justify-between items-center mb-2">
                                <span className="text-[9px] font-bold text-zinc-500 uppercase">{I18N[lang].recent_label}</span>
                                <button onClick={() => setHistory([])} className="text-[9px] text-zinc-400 hover:text-zinc-950">Clear</button>
                            </div>
                            <div className="flex space-x-2">
                                {history.map(p => (
                                    <img key={p.id} src={p.img} alt={p.name} onClick={() => setQuickViewProduct(p)} className="w-10 h-14 object-cover border cursor-pointer hover:border-zinc-500" />
                                ))}
                            </div>
                        </div>
                    )}

                    {/* Toast Notification */}
                    <div className="fixed top-24 right-4 z-50 flex flex-col space-y-2 max-w-sm w-full">
                        {toasts.map(t => (
                            <div key={t.id} className="p-4 bg-zinc-900 text-white rounded shadow-lg text-xs font-semibold flex items-center justify-between border border-zinc-800">
                                <span>{t.message}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // Mount React application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
